sonar.projectKey=aaronsd914_TFG
sonar.organization=aaronsd914

# Fuentes analizadas
sonar.sources=backend/app,frontend/src
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/*.pyc,**/migrations/**,frontend/public/**

# Python
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage-backend.xml

# JavaScript / React
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Codificación
sonar.sourceEncoding=UTF-8

# Exclusiones de cobertura:
#   - Ficheros de configuración/entrada sin lógica testeable
#   - API clients (0 % coverage; son mocks en los tests unitarios)
#   - Hooks personalizados (cubiertos indirectamente por los tests de componentes)
#   - Componentes de página con tests E2E dedicados (no unit-testables de forma
#     razonable sin un servidor real)
#   - Módulos backend que llaman a servicios externos (IA, seed, config Stripe)
sonar.coverage.exclusions=\
  frontend/src/main.jsx,\
  frontend/src/config.js,\
  frontend/src/i18n.js,\
  frontend/src/api/**,\
  frontend/src/hooks/**,\
  frontend/src/components/ProtectedRoute.jsx,\
  frontend/src/components/Badge.jsx,\
  frontend/src/components/Pagination.jsx,\
  frontend/src/components/AlbaranesPage.jsx,\
  frontend/src/components/BancoPage.jsx,\
  frontend/src/components/ClientesPage.jsx,\
  frontend/src/components/MovimientosPage.jsx,\
  frontend/src/components/NuevaVenta.jsx,\
  frontend/src/components/ProductosPage.jsx,\
  frontend/src/components/TransportePage.jsx,\
  frontend/src/components/Tendencias.jsx,\
  backend/app/seed.py,\
  backend/app/stripe_config.py,\
  backend/app/api/ai.py,\
  backend/app/utils/groq_llm.py
