name: CI/CD — Pull Request a main

on:
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'memoria/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/furnigest-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/furnigest-frontend

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. LINT — comprobación rápida de calidad de código
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Ruff
        run: pip install ruff

      - name: Ruff — linting
        run: ruff check backend/ --output-format=github

      - name: Ruff — formato
        run: ruff format backend/ --check

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  # ──────────────────────────────────────────────────────────────────────────
  # 2a. BACKEND TESTS
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Crear ficheros de configuración dummy
        run: bash .github/scripts/create-dummy-configs.sh

      - name: Ejecutar tests con cobertura
        run: |
          pytest test/backend/ \
            --cov=backend/app \
            --cov-report=xml:coverage-backend.xml \
            -v

      - name: Subir informe de cobertura (XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: coverage-backend.xml

  # ──────────────────────────────────────────────────────────────────────────
  # 2b. FRONTEND TESTS
  # ──────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Ejecutar tests con cobertura
        working-directory: frontend
        run: npm run test:coverage

      - name: Subir informe de cobertura (LCOV)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/lcov.info

  # ──────────────────────────────────────────────────────────────────────────
  # 3. SONARCLOUD — análisis de calidad y seguridad
  # ──────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar cobertura del backend
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend

      - name: Descargar cobertura del frontend
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 4. E2E — tests de extremo a extremo con Selenium
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Selenium)
    runs-on: ubuntu-latest
    needs: sonarcloud
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias backend + E2E
        run: |
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Crear ficheros de configuración dummy
        run: bash .github/scripts/create-dummy-configs.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Build del frontend (apuntando al backend local)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Arrancar backend (SQLite, puerto 8000)
        env:
          DATABASE_URL: sqlite:///./e2e_test.db
        run: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &

      - name: Arrancar frontend (vite preview, puerto 5173)
        working-directory: frontend
        run: npx vite preview --host --port 5173 &

      - name: Esperar al backend
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Backend listo (intento $i)"; break
            fi
            sleep 2
          done

      - name: Esperar al frontend
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend listo (intento $i)"; break
            fi
            sleep 2
          done

      - name: Ejecutar tests E2E
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_USER: admin
          E2E_PASS: admin123
          DISPLAY: ":99"
        run: pytest test/e2e/ -v --tb=short --junit-xml=test-results-e2e.xml

      - name: Subir capturas de pantalla (solo en fallo)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test/e2e/screenshots/
          if-no-files-found: ignore

      - name: Subir informe JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-junit-report
          path: test-results-e2e.xml
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # 5. DOCKER — build y push de imágenes a GitHub Container Registry
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadatos — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build y push — backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Metadatos — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build y push — frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  # ──────────────────────────────────────────────────────────────────────────
  # 6. DEPLOY — Vercel (frontend) + Railway (backend)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (Vercel + Railway)
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Deploy frontend en Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend en Railway
        run: railway up --detach --service ${{ secrets.RAILWAY_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
