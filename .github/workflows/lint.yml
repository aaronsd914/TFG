name: Lint — Calidad de código

on:
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Ruff — linter y formateador para Python
  # ────────────────────────────────────────────────────────────
  ruff:
    name: Ruff (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Ruff
        run: pip install ruff

      - name: Ejecutar Ruff (linting)
        run: ruff check backend/ --output-format=github

      - name: Ejecutar Ruff (formato)
        run: ruff format backend/ --check

  # ────────────────────────────────────────────────────────────
  # JOB 2: ESLint — linter para JavaScript / React
  # ────────────────────────────────────────────────────────────
  eslint:
    name: ESLint (JavaScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Ejecutar ESLint
        working-directory: frontend
        run: npm run lint
