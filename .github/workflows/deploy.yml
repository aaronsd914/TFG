name: Deploy — Producción

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Tests (backend + frontend) — requisito previo al deploy
  # ────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Create dummy config files
        run: |
          echo 'EMAIL_HOST=""; EMAIL_PORT=587; EMAIL_USER=""; EMAIL_PASSWORD=""; EMAIL_FROM=""; EMAIL_SENDER_NAME=""; RESEND_API_KEY=""; RESEND_FROM=""' > backend/app/settings_email.py
          echo 'GROQ_API_KEY=""; GROQ_MODEL="llama-3.1-8b-instant"; GROQ_BASE_URL="https://api.groq.com/openai/v1"; REQUEST_TIMEOUT=60' > backend/app/ia_settings.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_config.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_settings.py
          echo 'CAIXA_CLIENT_ID=""; CAIXA_CLIENT_SECRET=""; CAIXA_REDIRECT_URI=""; HUB_OAUTH_BASE=""; HUB_API_BASE=""; ASPSP_CODE="2100"; REQUEST_TIMEOUT=30; CAIXA_ENV="sandbox"; DEMO=True' > backend/app/bank_settings.py
      - run: pytest test/backend/ -q

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  # ────────────────────────────────────────────────────────────
  # JOB 3: Deploy del frontend en Vercel (solo si tests pasan)
  # ────────────────────────────────────────────────────────────
  # ────────────────────────────────────────────────────────────
  # JOB 3: SonarCloud quality gate (solo si tests pasan)
  # ────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita el historial completo

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias del backend
        run: pip install -r requirements.txt

      - name: Create dummy config files
        run: |
          echo 'EMAIL_HOST=""; EMAIL_PORT=587; EMAIL_USER=""; EMAIL_PASSWORD=""; EMAIL_FROM=""; EMAIL_SENDER_NAME=""; RESEND_API_KEY=""; RESEND_FROM=""' > backend/app/settings_email.py
          echo 'GROQ_API_KEY=""; GROQ_MODEL="llama-3.1-8b-instant"; GROQ_BASE_URL="https://api.groq.com/openai/v1"; REQUEST_TIMEOUT=60' > backend/app/ia_settings.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_config.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_settings.py
          echo 'CAIXA_CLIENT_ID=""; CAIXA_CLIENT_SECRET=""; CAIXA_REDIRECT_URI=""; HUB_OAUTH_BASE=""; HUB_API_BASE=""; ASPSP_CODE="2100"; REQUEST_TIMEOUT=30; CAIXA_ENV="sandbox"; DEMO=True' > backend/app/bank_settings.py

      - name: Generar cobertura del backend (XML)
        run: pytest test/backend/ --cov=backend/app --cov-report=xml:coverage-backend.xml -q

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend e instalar @vitest/coverage-v8
        working-directory: frontend
        run: npm ci

      - name: Generar cobertura del frontend (LCOV)
        working-directory: frontend
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ────────────────────────────────────────────────────────────
  # JOB 4: Deploy del frontend en Vercel (solo si Sonar pasa)
  # ────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [sonarcloud]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Deploy en Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ────────────────────────────────────────────────────────────
  # JOB 5: Deploy del backend en Railway (solo si Sonar pasa)
  # ────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: [sonarcloud]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli@3

      - name: Deploy en Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
