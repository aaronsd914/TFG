name: Deploy — Producción

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Tests (backend + frontend) — requisito previo al deploy
  # ────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Create dummy config files
        run: |
          echo 'EMAIL_HOST=""; EMAIL_PORT=587; EMAIL_USER=""; EMAIL_PASSWORD=""; EMAIL_FROM=""; EMAIL_SENDER_NAME=""; RESEND_API_KEY=""; RESEND_FROM=""' > backend/app/settings_email.py
          echo 'GROQ_API_KEY=""; GROQ_MODEL="llama-3.1-8b-instant"; GROQ_BASE_URL="https://api.groq.com/openai/v1"; REQUEST_TIMEOUT=60' > backend/app/ia_settings.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_config.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_settings.py
          echo 'CAIXA_CLIENT_ID=""; CAIXA_CLIENT_SECRET=""; CAIXA_REDIRECT_URI=""; HUB_OAUTH_BASE=""; HUB_API_BASE=""; ASPSP_CODE="2100"; REQUEST_TIMEOUT=30; CAIXA_ENV="sandbox"; DEMO=True' > backend/app/bank_settings.py
      - run: pytest test/backend/ -q

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  # ────────────────────────────────────────────────────────────
  # JOB 3: Deploy del frontend en Vercel (solo si tests pasan)
  # ────────────────────────────────────────────────────────────
  # ────────────────────────────────────────────────────────────
  # JOB 3: SonarCloud quality gate (solo si tests pasan)
  # ────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita el historial completo

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias del backend
        run: pip install -r requirements.txt

      - name: Create dummy config files
        run: |
          echo 'EMAIL_HOST=""; EMAIL_PORT=587; EMAIL_USER=""; EMAIL_PASSWORD=""; EMAIL_FROM=""; EMAIL_SENDER_NAME=""; RESEND_API_KEY=""; RESEND_FROM=""' > backend/app/settings_email.py
          echo 'GROQ_API_KEY=""; GROQ_MODEL="llama-3.1-8b-instant"; GROQ_BASE_URL="https://api.groq.com/openai/v1"; REQUEST_TIMEOUT=60' > backend/app/ia_settings.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_config.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_settings.py
          echo 'CAIXA_CLIENT_ID=""; CAIXA_CLIENT_SECRET=""; CAIXA_REDIRECT_URI=""; HUB_OAUTH_BASE=""; HUB_API_BASE=""; ASPSP_CODE="2100"; REQUEST_TIMEOUT=30; CAIXA_ENV="sandbox"; DEMO=True' > backend/app/bank_settings.py

      - name: Generar cobertura del backend (XML)
        run: pytest test/backend/ --cov=backend/app --cov-report=xml:coverage-backend.xml -q

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend e instalar @vitest/coverage-v8
        working-directory: frontend
        run: npm ci

      - name: Generar cobertura del frontend (LCOV)
        working-directory: frontend
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ────────────────────────────────────────────────────────────
  # JOB 4: Tests E2E con Selenium (solo si Sonar pasa)
  # ────────────────────────────────────────────────────────────
  e2e:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias del backend + E2E
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Crear ficheros de configuración dummy para CI
        run: |
          echo "EMAIL_HOST=''"          > backend/app/settings_email.py
          echo "EMAIL_PORT=587"        >> backend/app/settings_email.py
          echo "EMAIL_USER=''"         >> backend/app/settings_email.py
          echo "EMAIL_PASSWORD=''"     >> backend/app/settings_email.py
          echo "EMAIL_FROM='test@test.com'" >> backend/app/settings_email.py
          echo "EMAIL_SENDER_NAME='Test'"   >> backend/app/settings_email.py
          echo "RESEND_API_KEY=''"     >> backend/app/settings_email.py
          echo "RESEND_FROM=''"        >> backend/app/settings_email.py

          echo "GROQ_API_KEY=''"       > backend/app/ia_settings.py
          echo "GROQ_BASE_URL=''"      >> backend/app/ia_settings.py
          echo "GROQ_MODEL=''"         >> backend/app/ia_settings.py
          echo "REQUEST_TIMEOUT=60"    >> backend/app/ia_settings.py

          echo "CAIXA_ENV=''"          > backend/app/bank_settings.py
          echo "HUB_OAUTH_BASE=''"     >> backend/app/bank_settings.py
          echo "HUB_API_BASE=''"       >> backend/app/bank_settings.py
          echo "CAIXA_CLIENT_ID=''"    >> backend/app/bank_settings.py
          echo "CAIXA_CLIENT_SECRET=''" >> backend/app/bank_settings.py
          echo "CAIXA_REDIRECT_URI=''" >> backend/app/bank_settings.py
          echo "ASPSP_CODE=''"         >> backend/app/bank_settings.py
          echo "REQUEST_TIMEOUT=30"    >> backend/app/bank_settings.py
          echo "DEMO=True"             >> backend/app/bank_settings.py

          echo "STRIPE_SECRET_KEY=''"        > backend/app/stripe_config.py
          echo "STRIPE_PUBLISHABLE_KEY=''"   >> backend/app/stripe_config.py
          echo "STRIPE_CURRENCY='eur'"       >> backend/app/stripe_config.py
          echo "STRIPE_SUCCESS_URL=''"       >> backend/app/stripe_config.py
          echo "STRIPE_CANCEL_URL=''"        >> backend/app/stripe_config.py

          echo "STRIPE_SECRET_KEY=''"        > backend/app/stripe_settings.py
          echo "STRIPE_PUBLISHABLE_KEY=''"   >> backend/app/stripe_settings.py
          echo "STRIPE_CURRENCY='eur'"       >> backend/app/stripe_settings.py
          echo "STRIPE_SUCCESS_URL=''"       >> backend/app/stripe_settings.py
          echo "STRIPE_CANCEL_URL=''"        >> backend/app/stripe_settings.py

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Build del frontend (apuntando al backend local)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Arrancar backend (SQLite, puerto 8000)
        env:
          DATABASE_URL: sqlite:///./e2e_test.db
        run: |
          uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/backend.pid

      - name: Arrancar frontend (vite preview, puerto 5173)
        working-directory: frontend
        run: |
          npx vite preview --host --port 5173 &
          echo $! > /tmp/frontend.pid

      - name: Esperar al backend
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/docs > /dev/null 2>&1; then break; fi
            sleep 2
          done

      - name: Esperar al frontend
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:5173 > /dev/null 2>&1; then break; fi
            sleep 2
          done

      - name: Ejecutar tests Selenium E2E
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_USER: admin
          E2E_PASS: admin123
          DISPLAY: ":99"
        run: pytest test/e2e/ -v --tb=short --junit-xml=test-results-e2e.xml

      - name: Subir capturas de pantalla (sólo en fallo)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test/e2e/screenshots/
          if-no-files-found: ignore

      - name: Subir informe JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-junit-report
          path: test-results-e2e.xml
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────
  # JOB 5: Deploy del frontend en Vercel (solo si E2E pasa)
  # ────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [sonarcloud, e2e]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Deploy en Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ────────────────────────────────────────────────────────────
  # JOB 6: Deploy del backend en Railway (solo si E2E pasa)
  # ────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: [sonarcloud, e2e]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy en Railway
        run: railway up --detach --service ${{ secrets.RAILWAY_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
