name: SonarCloud — Quality Gate

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**', 'docs/**']
    paths-ignore:
      - '**.md'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud necesita el historial completo para blame/new code

      # ── Backend: generar coverage.xml ──────────────────────────────────────
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias del backend
        run: pip install -r requirements.txt

      - name: Crear ficheros de config dummy para CI
        run: |
          echo 'EMAIL_HOST=""; EMAIL_PORT=587; EMAIL_USER=""; EMAIL_PASSWORD=""; EMAIL_FROM=""; EMAIL_SENDER_NAME=""; RESEND_API_KEY=""; RESEND_FROM=""' > backend/app/settings_email.py
          echo 'GROQ_API_KEY=""; GROQ_MODEL="llama-3.1-8b-instant"; GROQ_BASE_URL="https://api.groq.com/openai/v1"; REQUEST_TIMEOUT=60' > backend/app/ia_settings.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_config.py
          echo 'STRIPE_SECRET_KEY=""; STRIPE_PUBLISHABLE_KEY=""; STRIPE_SUCCESS_URL=""; STRIPE_CANCEL_URL=""; STRIPE_CURRENCY="eur"' > backend/app/stripe_settings.py
          echo 'CAIXA_CLIENT_ID=""; CAIXA_CLIENT_SECRET=""; CAIXA_REDIRECT_URI=""; HUB_OAUTH_BASE=""; HUB_API_BASE=""; ASPSP_CODE="2100"; REQUEST_TIMEOUT=30; CAIXA_ENV="sandbox"; DEMO=True' > backend/app/bank_settings.py

      - name: Ejecutar tests backend y generar coverage XML
        run: |
          pytest test/backend/ \
            --cov=backend/app \
            --cov-report=xml:coverage-backend.xml \
            -q

      # ── Frontend: generar lcov.info ─────────────────────────────────────────
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Ejecutar tests frontend y generar cobertura LCOV
        working-directory: frontend
        run: npm run test:coverage

      # ── SonarCloud scan ─────────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
