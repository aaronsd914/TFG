name: Tests E2E — Selenium

on:
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '**.md'
      - 'memoria/**'
  workflow_dispatch:
  workflow_dispatch:

jobs:
  e2e:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Código fuente ──────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Python + backend ───────────────────────────────────────────────
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias del backend + E2E
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Crear ficheros de configuración dummy para CI
        run: |
          echo "EMAIL_HOST=''"          > backend/app/settings_email.py
          echo "EMAIL_PORT=587"        >> backend/app/settings_email.py
          echo "EMAIL_USER=''"         >> backend/app/settings_email.py
          echo "EMAIL_PASSWORD=''"     >> backend/app/settings_email.py
          echo "EMAIL_FROM='test@test.com'" >> backend/app/settings_email.py
          echo "EMAIL_SENDER_NAME='Test'"   >> backend/app/settings_email.py
          echo "RESEND_API_KEY=''"     >> backend/app/settings_email.py
          echo "RESEND_FROM=''"        >> backend/app/settings_email.py

          echo "GROQ_API_KEY=''"       > backend/app/ia_settings.py
          echo "GROQ_BASE_URL=''"      >> backend/app/ia_settings.py
          echo "GROQ_MODEL=''"         >> backend/app/ia_settings.py
          echo "REQUEST_TIMEOUT=60"    >> backend/app/ia_settings.py

          echo "CAIXA_ENV=''"          > backend/app/bank_settings.py
          echo "HUB_OAUTH_BASE=''"     >> backend/app/bank_settings.py
          echo "HUB_API_BASE=''"       >> backend/app/bank_settings.py
          echo "CAIXA_CLIENT_ID=''"    >> backend/app/bank_settings.py
          echo "CAIXA_CLIENT_SECRET=''" >> backend/app/bank_settings.py
          echo "CAIXA_REDIRECT_URI=''" >> backend/app/bank_settings.py
          echo "ASPSP_CODE=''"         >> backend/app/bank_settings.py
          echo "REQUEST_TIMEOUT=30"    >> backend/app/bank_settings.py
          echo "DEMO=True"             >> backend/app/bank_settings.py

          echo "STRIPE_SECRET_KEY=''"        > backend/app/stripe_config.py
          echo "STRIPE_PUBLISHABLE_KEY=''"   >> backend/app/stripe_config.py
          echo "STRIPE_CURRENCY='eur'"       >> backend/app/stripe_config.py
          echo "STRIPE_SUCCESS_URL=''"       >> backend/app/stripe_config.py
          echo "STRIPE_CANCEL_URL=''"        >> backend/app/stripe_config.py

          echo "STRIPE_SECRET_KEY=''"        > backend/app/stripe_settings.py
          echo "STRIPE_PUBLISHABLE_KEY=''"   >> backend/app/stripe_settings.py
          echo "STRIPE_CURRENCY='eur'"       >> backend/app/stripe_settings.py
          echo "STRIPE_SUCCESS_URL=''"       >> backend/app/stripe_settings.py
          echo "STRIPE_CANCEL_URL=''"        >> backend/app/stripe_settings.py

      # ── 3. Node.js + frontend ─────────────────────────────────────────────
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Build del frontend (apuntando al backend local)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

      # ── 4. Chrome ─────────────────────────────────────────────────────────
      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # ── 5. Arrancar servicios ─────────────────────────────────────────────
      - name: Arrancar backend (SQLite, puerto 8000)
        env:
          DATABASE_URL: sqlite:///./e2e_test.db
        run: |
          uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/backend.pid

      - name: Arrancar frontend (vite preview, puerto 5173)
        working-directory: frontend
        run: |
          npx vite preview --host --port 5173 &
          echo $! > /tmp/frontend.pid

      # ── 6. Esperar a que los servicios estén listos ───────────────────────
      - name: Esperar al backend
        run: |
          echo "Esperando al backend en http://localhost:8000 ..."
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Backend listo (intento $i)"
              break
            fi
            sleep 2
          done

      - name: Esperar al frontend
        run: |
          echo "Esperando al frontend en http://localhost:5173 ..."
          for i in $(seq 1 30); do
            if curl -fs http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend listo (intento $i)"
              break
            fi
            sleep 2
          done

      # ── 7. Ejecutar tests E2E ─────────────────────────────────────────────
      - name: Ejecutar tests Selenium E2E
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_USER: admin
          E2E_PASS: admin123
          DISPLAY: ":99"
        run: |
          pytest test/e2e/ -v --tb=short \
            --junit-xml=test-results-e2e.xml

      # ── 8. Artefactos ─────────────────────────────────────────────────────
      - name: Subir capturas de pantalla (sólo en fallo)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test/e2e/screenshots/
          if-no-files-found: ignore

      - name: Subir informe JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-junit-report
          path: test-results-e2e.xml
          if-no-files-found: ignore
