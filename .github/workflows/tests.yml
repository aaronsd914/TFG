name: Tests Automáticos — Financias

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '**.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '**.md'
  schedule:
    # Se ejecuta todos los días a las 6:00 AM (UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:  # permite lanzarlo manualmente desde GitHub

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Tests del backend (Python + FastAPI + SQLite en memoria)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias del backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy config files for CI
        run: |
          touch backend/app/ia_settings.py
          touch backend/app/settings_email.py
          touch backend/app/bank_settings.py
          touch backend/app/stripe_settings.py
          touch backend/app/stripe_config.py
          
          echo "EMAIL_HOST=''" > backend/app/settings_email.py
          echo "EMAIL_PORT=587" >> backend/app/settings_email.py
          echo "EMAIL_USER=''" >> backend/app/settings_email.py
          echo "EMAIL_PASSWORD=''" >> backend/app/settings_email.py
          echo "EMAIL_FROM='test@test.com'" >> backend/app/settings_email.py
          echo "EMAIL_SENDER_NAME='Test'" >> backend/app/settings_email.py
          echo "RESEND_API_KEY=''" >> backend/app/settings_email.py
          echo "RESEND_FROM=''" >> backend/app/settings_email.py
          
          echo "GROQ_API_KEY=''" > backend/app/ia_settings.py
          echo "GROQ_BASE_URL=''" >> backend/app/ia_settings.py
          echo "GROQ_MODEL=''" >> backend/app/ia_settings.py
          echo "REQUEST_TIMEOUT=60" >> backend/app/ia_settings.py
          
          echo "CAIXA_ENV=''" > backend/app/bank_settings.py
          echo "HUB_OAUTH_BASE=''" >> backend/app/bank_settings.py
          echo "HUB_API_BASE=''" >> backend/app/bank_settings.py
          echo "CAIXA_CLIENT_ID=''" >> backend/app/bank_settings.py
          echo "CAIXA_CLIENT_SECRET=''" >> backend/app/bank_settings.py
          echo "CAIXA_REDIRECT_URI=''" >> backend/app/bank_settings.py
          echo "ASPSP_CODE=''" >> backend/app/bank_settings.py
          echo "REQUEST_TIMEOUT=30" >> backend/app/bank_settings.py
          echo "DEMO=True" >> backend/app/bank_settings.py
          
          echo "STRIPE_SECRET_KEY=''" > backend/app/stripe_config.py
          echo "STRIPE_PUBLISHABLE_KEY=''" >> backend/app/stripe_config.py
          echo "STRIPE_CURRENCY='eur'" >> backend/app/stripe_config.py
          echo "STRIPE_SUCCESS_URL=''" >> backend/app/stripe_config.py
          echo "STRIPE_CANCEL_URL=''" >> backend/app/stripe_config.py
          
          echo "STRIPE_SECRET_KEY=''" > backend/app/stripe_settings.py
          echo "STRIPE_PUBLISHABLE_KEY=''" >> backend/app/stripe_settings.py
          echo "STRIPE_CURRENCY='eur'" >> backend/app/stripe_settings.py
          echo "STRIPE_SUCCESS_URL=''" >> backend/app/stripe_settings.py
          echo "STRIPE_CANCEL_URL=''" >> backend/app/stripe_settings.py

      - name: Ejecutar tests con cobertura
        run: |
          pytest test/backend/ \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-backend.xml \
            -v

      - name: Subir informe de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: coverage-backend.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests del frontend (Vitest + React Testing Library)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Ejecutar tests con cobertura
        working-directory: frontend
        run: npm run test:coverage

      - name: Subir informe de cobertura (LCOV)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/lcov.info

        # Los tests están en frontend/test/ y se ejecutan con vitest run

