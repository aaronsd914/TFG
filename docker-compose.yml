services:

  # ── Base de datos PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: TFG
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:root@db:5432/TFG
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Monta los archivos de config locales (gitignoreados) dentro del contenedor
      - ./backend/app/settings_email.py:/app/backend/app/settings_email.py:ro
      - ./backend/app/ia_settings.py:/app/backend/app/ia_settings.py:ro
      - ./backend/app/bank_settings.py:/app/backend/app/bank_settings.py:ro
      - ./backend/app/stripe_config.py:/app/backend/app/stripe_config.py:ro
      - ./backend/app/stripe_settings.py:/app/backend/app/stripe_settings.py:ro

  # ── Frontend React (Vite build + Nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
